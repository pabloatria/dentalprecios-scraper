name: Daily Scraper Health Check

# No untrusted inputs used — only reads Supabase and creates issues from a file
# generated by a trusted Python script in this repo.

on:
  schedule:
  # 11:13 UTC daily — well after the scrape window (04:00-08:00 UTC) finishes
  - cron: '13 11 * * *'
  workflow_dispatch: {}

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install supabase

      - name: Run health check
        id: check
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          python scrapers/health_check.py > /tmp/health_report.md 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat /tmp/health_report.md

      - name: Open issue if any supplier is stale
        if: steps.check.outputs.exit_code == '1'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/health_report.md', 'utf8');
            const date = new Date().toISOString().split('T')[0];

            // Avoid duplicate issues: close any open health issue from a previous day
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scraper-health',
            });
            for (const iss of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: iss.number,
                state: 'closed',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Stale scrapers detected — ${date}`,
              body: report,
              labels: ['scraper-health', 'monitoring'],
            });

      - name: Fail the job if stale
        if: steps.check.outputs.exit_code == '1'
        run: exit 1
