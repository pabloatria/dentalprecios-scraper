# CUTOVER MODE: schedule is disabled while we verify the new public repo
# is working end-to-end. Re-enable by uncommenting the `schedule:` block
# below once Pablo has confirmed a manual workflow_dispatch run succeeded.
name: Daily Price Scrape

on:
  # schedule:
  # # Runs at 04:00 UTC (01:00 Chile time), then small random delay 0-60min.
  # # Effective start range: 01:00 - 02:00 Chile time (UTC-3).
  # # NOTE: GitHub Actions `timeout-minutes` covers the WHOLE job including
  # # the delay step. A 4h delay + 5h scrape would hit 5h cap → partial
  # # scrape silently "cancelled". Keep delay + scrape under 6h hard cap.
  # - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 6h = GitHub-hosted runner hard limit. With delay ≤60min and ~12
    # Playwright scrapers (each 3–8min incl CF warmup) running sequentially,
    # the run lands around 3–4h with comfortable margin.
    timeout-minutes: 355
    permissions:
      contents: read
      issues: write

    steps:
      - name: Random delay (0-60min)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 3600))
          echo "Sleeping for $DELAY seconds ($(($DELAY / 60))m)"
          sleep $DELAY

      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd scrapers
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scrapers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scrapers
          python main.py

      - name: Revalidate ISR cache
        if: success()
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Custom UA required — middleware blocks bare curl/* in BLOCKED_BOTS list.
          HTTP_CODE=$(curl -s -o /tmp/revalidate.json -w '%{http_code}' \
            -X POST "https://www.dentalprecios.cl/api/revalidate" \
            -A "DentalPrecios-GHActions/1.0 (+ops@dentalprecios.cl)" \
            -H "Authorization: Bearer ${CRON_SECRET}")
          BODY=$(cat /tmp/revalidate.json)
          echo "Revalidation response: HTTP ${HTTP_CODE} — ${BODY}"
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::warning::ISR revalidation failed with HTTP ${HTTP_CODE}: ${BODY}"
          fi

      - name: Notify IndexNow (Bing/Yandex)
        if: always()
        run: |
          curl -s -X POST https://www.dentalprecios.cl/api/indexnow \
            -A "DentalPrecios-GHActions/1.0 (+ops@dentalprecios.cl)" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "IndexNow notification failed (non-critical)"

      # Same-day alert: open a GH issue if the scrape was cancelled (e.g. hit
      # the timeout) or failed. Without this, a cancelled run looks "green"
      # until suppliers go stale 48h later and the health check catches it.
      - name: Open issue on scrape failure/cancellation
        if: failure() || cancelled()
        uses: actions/github-script@v8
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const status = process.env.JOB_STATUS;
            const runUrl = process.env.RUN_URL;
            const date = new Date().toISOString().split('T')[0];

            // Close any prior open scrape-failure issue to avoid noise
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scrape-failure',
            });
            for (const iss of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: iss.number,
                state: 'closed',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily scrape ${status} — ${date}`,
              body: [
                `The daily price scrape ended with status: **${status}**.`,
                ``,
                `- Run: ${runUrl}`,
                `- Date: ${date}`,
                ``,
                status === 'cancelled'
                  ? 'A `cancelled` status most often means the job hit the 355-minute timeout. Review the delay + scraper duration and consider bumping `timeout-minutes` or trimming slow scrapers.'
                  : 'Review the failing step in the run link above.',
              ].join('\n'),
              labels: ['scrape-failure', 'monitoring'],
            });
